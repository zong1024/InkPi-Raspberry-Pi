name: Python CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      INKPI_TEST_MODE: "true"
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint core project files
        run: |
          flake8 main.py cloud_api config services views web_ui test_*.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 main.py cloud_api config services views web_ui test_*.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run cross-platform tests
        run: |
          # GitHub hosted runners do not provide Raspberry Pi camera / GPIO / SPI hardware.
          # CI only verifies the stable cross-platform logic here.
          python -m unittest test_web_ui.py test_all.py test_cloud_api.py test_cloud_ocr_api.py
