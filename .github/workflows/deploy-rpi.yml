name: Deploy Raspberry Pi Stack

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: true
        default: master
      release_version:
        description: Optional release label
        required: false
      web_port:
        description: WebUI port on the Raspberry Pi
        required: true
        default: "5000"
      cloud_port:
        description: Cloud API port on the Raspberry Pi
        required: true
        default: "5001"

permissions:
  contents: read

concurrency:
  group: deploy-raspberry-pi
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web_console/package-lock.json

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.INKPI_RPI_SSH_KEY }}

      - name: Trust Raspberry Pi host key
        env:
          INKPI_RPI_PORT: ${{ secrets.INKPI_RPI_PORT }}
        run: |
          mkdir -p ~/.ssh
          port="${INKPI_RPI_PORT:-22}"
          ssh-keyscan -p "$port" "${{ secrets.INKPI_RPI_HOST }}" >> ~/.ssh/known_hosts

      - name: Run Raspberry Pi regression checks
        run: bash scripts/rpi_lint_test.sh

      - name: Build Raspberry Pi release bundle
        env:
          INPUT_RELEASE_VERSION: ${{ inputs.release_version }}
        shell: bash
        run: |
          if [ -n "${INPUT_RELEASE_VERSION}" ]; then
            export INKPI_RELEASE_VERSION="${INPUT_RELEASE_VERSION}"
          else
            export INKPI_RELEASE_VERSION="${GITHUB_SHA}"
          fi
          bash scripts/package_rpi_release.sh

      - name: Deploy Raspberry Pi bundle
        env:
          INKPI_DEPLOY_HOST: ${{ secrets.INKPI_RPI_HOST }}
          INKPI_DEPLOY_USER: ${{ secrets.INKPI_RPI_USER }}
          INKPI_DEPLOY_PORT: ${{ secrets.INKPI_RPI_PORT }}
          INKPI_DEPLOY_TARGET_DIR: ${{ secrets.INKPI_RPI_TARGET_DIR }}
          INKPI_DEPLOY_MODE: server
          INKPI_RELEASE_ID: rpi-${{ github.run_number }}-${{ github.sha }}
          INKPI_REMOTE_WEB_PORT: ${{ inputs.web_port }}
          INKPI_REMOTE_CLOUD_PORT: ${{ inputs.cloud_port }}
        run: |
          bundle="$(ls dist/releases/inkpi-rpi-release-*.tar.gz | sort | tail -n 1)"
          bash scripts/deploy_rpi_release.sh "${bundle}"
