<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e03229",
                        "background-light": "#f8f6f6",
                        "background-dark": "#211211",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Newsreader', "Microsoft YaHei", sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-full min-h-screen w-full flex-col group/design-root overflow-x-hidden max-w-md mx-auto shadow-xl">

</button>
</div>
</div>
<!-- Personal Info Section -->
<div class="flex p-6 @container bg-white dark:bg-slate-900/50 mt-2 mx-4 rounded-xl border border-primary/5 shadow-sm">
<div class="flex flex-col gap-4 items-center w-full">
<div class="flex flex-col gap-4 items-center">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full border-2 border-primary/20 min-h-20 w-20 shadow-inner" data-alt="Traditional Chinese calligraphy artist portrait" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuD7TJ4jAFwqphZVrrKze-dG8LAM01yLCEGZReDwkN_3vZDNkbp4qLc2VQRIn4SBSUp3HpkcWTjY9uRBcgsrHKrchZ859U3FgBaTEJAXy3-450h0Ji-415s0B2apiT5rCK7SE6RZF1VNBuU42ObUHYQJHNTrWRUu9IIOWa7EeM_rIfEM6pzGn7LW93AI123Qmvjl-XYnGWxkNoT1pWSVIzum_Bciprj2mP27imIlk1zJxwmqF4mfrx7X-PHFyrJpAfq4cjIVr4ZXYisi");'>
</div>
<div class="flex flex-col justify-center items-center">
<p class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight font-display">墨染江南</p>
</div>
</div>
</div>
</div>
<!-- Statistics Section -->
<!-- Function List -->
<div class="flex flex-col px-4 gap-2 mb-20 mt-4"><h3 class="text-slate-900 dark:text-slate-100 text-sm font-bold leading-tight px-1 py-2 opacity-60">常用功能</h3>
<a class="flex items-center justify-between p-4 bg-white dark:bg-slate-900/50 rounded-xl border border-primary/5 group" href="#">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-primary/5 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">settings</span>
</div>
<span class="text-slate-800 dark:text-slate-200 font-medium">设置</span>
</div>
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">chevron_right</span>
</a></div>
<!-- Spacer to prevent content cut by navbar -->
<div class="flex-grow"></div>
<!-- Bottom Navigation Bar -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto z-20">
<div class="flex gap-2 border-t border-primary/10 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-sm px-4 pb-6 pt-3"><a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">history</span>
<p class="text-[10px] font-bold leading-normal tracking-wider">历史记录</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<p class="text-[10px] font-bold leading-normal tracking-wider">我的</p>
</a></div>
</div>
</div>
